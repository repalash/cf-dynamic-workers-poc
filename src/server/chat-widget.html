<style>
#__tc{--bg:#0a0b0e;--bg2:#101217;--bg3:#1a1d24;--border:#1f2229;--text:#ebedf2;--muted:#9196a0;--dim:#5e626b;--accent:#ff8c42;--accent2:#ffa362;--err:#ff9a8f;position:fixed;top:0;right:0;bottom:0;width:380px;z-index:99999;display:flex;flex-direction:column;background:var(--bg);border-left:1px solid var(--border);font-family:system-ui,-apple-system,sans-serif;font-size:13px;color:var(--text);transition:transform .2s ease}
#__tc.collapsed{transform:translateX(100%)}
#__tc-toggle{position:fixed;bottom:20px;right:20px;z-index:99998;width:48px;height:48px;border-radius:50%;background:var(--accent);color:#1c0e05;border:none;cursor:pointer;font-weight:700;font-size:15px;box-shadow:0 2px 12px rgba(255,140,66,.3);display:flex;align-items:center;justify-content:center;transition:transform .15s}
#__tc-toggle:hover{transform:scale(1.08);background:var(--accent2)}
#__tc-toggle.hidden{display:none}
#__tc .hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
#__tc .hdr h2{margin:0;font-size:14px;font-weight:600}
#__tc .hdr-btns{display:flex;gap:6px}
#__tc .hdr-btn{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;padding:3px 8px;border-radius:4px;font-size:11px}
#__tc .hdr-btn:hover{color:var(--text);border-color:var(--muted)}
#__tc .msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px}
#__tc .msg{display:flex;flex-direction:column;gap:4px}
#__tc .msg-role{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--dim)}
#__tc .msg-body{line-height:1.5;word-wrap:break-word}
#__tc .msg-user .msg-body{background:var(--bg3);padding:8px 10px;border-radius:8px}
#__tc .tool{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px}
#__tc .tool-name{color:var(--accent);font-weight:500}
#__tc .tool-out{max-height:120px;overflow:auto;margin-top:4px;padding:4px 6px;background:var(--bg);border-radius:4px;font-family:monospace;font-size:11px;color:var(--muted);white-space:pre-wrap;word-break:break-all}
#__tc .tool-out.deploy-ok{border:1px solid rgba(74,222,128,.3);color:#4ade80}
#__tc pre{background:var(--bg2);padding:8px;border-radius:6px;overflow-x:auto;font-family:monospace;font-size:12px;margin:4px 0}
#__tc code.il{background:var(--bg3);padding:1px 4px;border-radius:3px;font-size:12px}
#__tc .thinking{margin:2px 0}
#__tc .thinking summary{font-size:11px;color:var(--dim);cursor:pointer;user-select:none;padding:4px 0;list-style:none;display:flex;align-items:center;gap:4px}
#__tc .thinking summary::before{content:"▶";font-size:8px;transition:transform .15s}
#__tc .thinking[open] summary::before{transform:rotate(90deg)}
#__tc .thinking-body{font-size:11px;color:var(--dim);line-height:1.5;padding:4px 8px;margin:2px 0 6px;border-left:2px solid var(--border);max-height:150px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
#__tc .thinking.active summary{color:var(--muted)}
#__tc .thinking.active summary::after{content:"";display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--accent);animation:__tc-blink 1.2s infinite;margin-left:4px}
#__tc .empty{color:var(--dim);text-align:center;padding:40px 20px;line-height:1.6}
#__tc .dots{display:flex;gap:4px;padding:4px 0}
#__tc .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:__tc-blink 1.2s infinite}
#__tc .dot:nth-child(2){animation-delay:.2s}
#__tc .dot:nth-child(3){animation-delay:.4s}
@keyframes __tc-blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
#__tc .inp{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
#__tc .inp textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:13px;resize:none;outline:none;min-height:36px;max-height:120px}
#__tc .inp textarea:focus{border-color:var(--accent)}
#__tc .inp button{background:var(--accent);color:#1c0e05;border:none;padding:0 14px;border-radius:6px;font-weight:600;font-size:12px;cursor:pointer;flex-shrink:0}
#__tc .inp button:hover{background:var(--accent2)}
#__tc .inp button:disabled{opacity:.4;cursor:default}
#__tc .reload-banner{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:#4ade80;padding:8px 12px;border-radius:6px;text-align:center;font-size:12px;font-weight:500}
#__tc .err-msg{background:rgba(255,154,143,.07);border:1px solid rgba(255,154,143,.24);color:var(--err);padding:8px 12px;border-radius:6px;font-size:12px}
#__tc .auth-form{display:flex;flex-direction:column;gap:8px;padding:20px}
#__tc .auth-form label{font-size:12px;color:var(--muted)}
#__tc .auth-form input{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 8px;color:var(--text);font-size:13px;outline:none}
#__tc .auth-form input:focus{border-color:var(--accent)}
</style>

<button id="__tc-toggle" onclick="window.__tcToggle()">AI</button>
<div id="__tc" class="collapsed">
  <div class="hdr">
    <h2>AI Assistant</h2>
    <div class="hdr-btns">
      <button class="hdr-btn" onclick="window.__tcClear()">Clear</button>
      <button class="hdr-btn" onclick="window.__tcToggle()">&times;</button>
    </div>
  </div>
  <div class="msgs" id="__tc-msgs"></div>
  <div class="inp" id="__tc-inp"></div>
</div>

<script>
(function(){
var LS_MSGS = "__tc_msgs";
var LS_AUTH = "__tc_auth";
var LS_OPEN = "__tc_open";
var API = "/_teeny/admin/api/chat";

var messages = [];
var streaming = false;
var authHeader = "";

function load() {
  try { messages = JSON.parse(localStorage.getItem(LS_MSGS) || "[]"); } catch(e) { messages = []; }
  authHeader = localStorage.getItem(LS_AUTH) || "";
  if (localStorage.getItem(LS_OPEN) === "1") window.__tcToggle();
}
function save() { localStorage.setItem(LS_MSGS, JSON.stringify(messages)); }
function uid() { return "m" + Date.now() + Math.random().toString(36).slice(2,6); }

/* --- Auth --- */
function renderAuth() {
  var box = document.getElementById("__tc-inp");
  box.innerHTML = '<div class="auth-form">' +
    '<label>Admin password</label>' +
    '<input type="password" id="__tc-pw" placeholder="password" />' +
    '<button style="background:var(--accent);color:#1c0e05;border:none;padding:6px 10px;border-radius:4px;cursor:pointer;font-weight:600;font-size:12px" onclick="window.__tcDoAuth()">Connect</button>' +
    '</div>';
}
window.__tcDoAuth = function() {
  var pw = document.getElementById("__tc-pw").value;
  if (!pw) return;
  authHeader = "Basic " + btoa("admin:" + pw);
  localStorage.setItem(LS_AUTH, authHeader);
  renderInput();
  render();
};

/* --- Toggle / Clear --- */
window.__tcToggle = function() {
  var panel = document.getElementById("__tc");
  var btn = document.getElementById("__tc-toggle");
  var collapsed = panel.classList.toggle("collapsed");
  btn.classList.toggle("hidden", !collapsed);
  localStorage.setItem(LS_OPEN, collapsed ? "0" : "1");
  if (!collapsed) {
    var ta = document.querySelector("#__tc-inp textarea");
    if (ta) ta.focus();
    scrollBottom();
  }
};
window.__tcClear = function() { messages = []; save(); render(); };

/* --- Render helpers --- */
function scrollBottom() {
  var el = document.getElementById("__tc-msgs");
  if (el) requestAnimationFrame(function(){ el.scrollTop = el.scrollHeight; });
}
function escHtml(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
function fmtText(text) {
  // split on ``` for code blocks
  var chunks = text.split("```");
  var out = "";
  for (var i = 0; i < chunks.length; i++) {
    if (i % 2 === 1) {
      // code block — skip optional language tag on first line
      var nl = chunks[i].indexOf("\n");
      var code = nl >= 0 ? chunks[i].slice(nl + 1) : chunks[i];
      out += "<pre><code>" + escHtml(code) + "</code></pre>";
    } else {
      // prose — escape then handle inline code
      var p = escHtml(chunks[i]);
      p = p.replace(/`([^`]+)`/g, '<code class="il">$1</code>');
      p = p.replace(/\n/g, "<br>");
      out += p;
    }
  }
  return out;
}

var toolLabels = {
  getStatus:"Checking status", getFiles:"Reading files", writeFile:"Writing file",
  deleteFile:"Deleting file", generateMigrations:"Generating migrations",
  deploy:"Deploying", getMigrationHistory:"Checking history",
  listTables:"Listing tables", queryTable:"Querying table",
  runSQL:"Running SQL", testEndpoint:"Testing endpoint",
  validateBuild:"Validating build"
};

function renderToolPart(part) {
  var name = part.type.slice(5);
  var label = toolLabels[name] || name;
  var arg = (part.input && part.input.filename) ? ": " + escHtml(part.input.filename) : "";
  if (part.input && part.input.path) arg = ": " + escHtml(part.input.path);
  var result = "";
  if (part.state === "output-available" && part.output) {
    var isDeploy = (name === "deploy" && part.output.ok);
    var cls = isDeploy ? "tool-out deploy-ok" : "tool-out";
    var txt = typeof part.output === "string" ? part.output : JSON.stringify(part.output, null, 2);
    if (txt.length > 800) txt = txt.slice(0, 800) + "...";
    result = '<div class="' + cls + '">' + escHtml(txt) + '</div>';
  } else if (part.state === "pending") {
    result = '<div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  }
  return '<div class="tool"><span class="tool-name">' + escHtml(label + arg) + '</span>' + result + '</div>';
}

function render() {
  var box = document.getElementById("__tc-msgs");
  if (!box) return;
  if (messages.length === 0) {
    box.innerHTML = '<div class="empty">Describe what you want to build or change.<br>I can edit schema, write pages, and deploy &mdash; all from here.</div>';
    scrollBottom();
    return;
  }
  var html = "";
  for (var mi = 0; mi < messages.length; mi++) {
    var m = messages[mi];
    var roleLabel = m.role === "user" ? "You" : "AI";
    var body = "";
    if (m.parts) {
      for (var pi = 0; pi < m.parts.length; pi++) {
        var p = m.parts[pi];
        if (p.type === "thinking") {
          var isActive = p.active ? " active" : "";
          body += '<details class="thinking' + isActive + '"' + (p.active ? ' open' : '') + '><summary>Thinking</summary><div class="thinking-body">' + escHtml(p.text || "") + '</div></details>';
        } else if (p.type === "text" && p.text) {
          body += "<div>" + fmtText(p.text) + "</div>";
        } else if (typeof p.type === "string" && p.type.indexOf("tool-") === 0 && p.toolCallId) {
          body += renderToolPart(p);
        }
      }
    }
    html += '<div class="msg msg-' + m.role + '"><div class="msg-role">' + roleLabel + '</div><div class="msg-body">' + body + '</div></div>';
  }
  if (streaming && messages.length > 0 && messages[messages.length - 1].role !== "assistant") {
    html += '<div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  }
  box.innerHTML = html;
  scrollBottom();
}

function renderInput() {
  var box = document.getElementById("__tc-inp");
  box.innerHTML = '<textarea placeholder="Describe changes..." rows="2"></textarea><button onclick="window.__tcSend()">Send</button>';
  var ta = box.querySelector("textarea");
  ta.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); window.__tcSend(); }
  });
}

function setInputDisabled(disabled) {
  var ta = document.querySelector("#__tc-inp textarea");
  var btn = document.querySelector("#__tc-inp button");
  if (ta) ta.disabled = disabled;
  if (btn) { btn.disabled = disabled; btn.textContent = disabled ? "..." : "Send"; }
}

/* --- Send + SSE streaming --- */
window.__tcSend = async function() {
  var ta = document.querySelector("#__tc-inp textarea");
  if (!ta) return;
  var text = ta.value.trim();
  if (!text || streaming) return;

  ta.value = "";
  streaming = true;
  setInputDisabled(true);

  messages.push({
    id: uid(), role: "user",
    parts: [{ type: "text", text: text }],
    createdAt: new Date().toISOString()
  });
  save();
  render();

  try {
    var res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": authHeader },
      body: JSON.stringify({ id: "teeny-chat", messages: messages, trigger: "submit-message" })
    });

    if (res.status === 401) {
      messages.pop();
      save();
      renderAuth();
      render();
      streaming = false;
      return;
    }

    if (!res.ok) {
      var errText = await res.text();
      messages.push({ id: uid(), role: "assistant", parts: [{ type: "text", text: "Error: " + (errText || res.statusText) }], createdAt: new Date().toISOString() });
      save(); render(); streaming = false; setInputDisabled(false);
      return;
    }

    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var aMsg = { id: uid(), role: "assistant", parts: [], createdAt: new Date().toISOString() };
    messages.push(aMsg);
    var curText = "";
    var curThinking = "";
    var thinkingActive = false;
    var buf = "";
    var deployDetected = false;
    var toolMap = {};

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buf += decoder.decode(chunk.value, { stream: true });
      var lines = buf.split("\n");
      buf = lines.pop();

      for (var li = 0; li < lines.length; li++) {
        var line = lines[li];
        if (line.indexOf("data: ") !== 0) continue;
        var raw = line.slice(6);
        if (raw === "[DONE]") continue;
        var evt;
        try { evt = JSON.parse(raw); } catch(e) { continue; }

        if (evt.type === "reasoning-start") {
          curThinking = "";
          thinkingActive = true;
          aMsg.parts.push({ type: "thinking", text: "", active: true });
        } else if (evt.type === "reasoning-delta") {
          curThinking += evt.delta;
          var thinkPart = null;
          for (var ti = aMsg.parts.length - 1; ti >= 0; ti--) {
            if (aMsg.parts[ti].type === "thinking" && aMsg.parts[ti].active) { thinkPart = aMsg.parts[ti]; break; }
          }
          if (thinkPart) thinkPart.text = curThinking;
        } else if (evt.type === "reasoning-end") {
          thinkingActive = false;
          for (var ti2 = aMsg.parts.length - 1; ti2 >= 0; ti2--) {
            if (aMsg.parts[ti2].type === "thinking" && aMsg.parts[ti2].active) { aMsg.parts[ti2].active = false; break; }
          }
        } else if (evt.type === "text-delta") {
          curText += evt.delta;
          var lastPart = aMsg.parts[aMsg.parts.length - 1];
          if (lastPart && lastPart.type === "text") {
            lastPart.text = curText;
          } else {
            aMsg.parts.push({ type: "text", text: curText });
          }
        } else if (evt.type === "start-step") {
          curText = "";
          curThinking = "";
        } else if (evt.type === "tool-input-start") {
          var idx = aMsg.parts.length;
          aMsg.parts.push({
            type: "tool-" + evt.toolName,
            toolCallId: evt.toolCallId,
            state: "pending",
            input: null, output: null
          });
          toolMap[evt.toolCallId] = idx;
        } else if (evt.type === "tool-input-available") {
          if (toolMap[evt.toolCallId] !== undefined) {
            aMsg.parts[toolMap[evt.toolCallId]].input = evt.input;
          }
        } else if (evt.type === "tool-output-available") {
          if (toolMap[evt.toolCallId] !== undefined) {
            var tp = aMsg.parts[toolMap[evt.toolCallId]];
            tp.output = evt.output;
            tp.state = "output-available";
            if (tp.type === "tool-deploy" && evt.output && evt.output.ok) {
              deployDetected = true;
            }
          }
        }
        render();
      }
    }

    save();
    streaming = false;
    setInputDisabled(false);
    render();

    if (deployDetected) {
      var banner = document.createElement("div");
      banner.className = "reload-banner";
      banner.textContent = "Changes deployed! Reloading page...";
      document.getElementById("__tc-msgs").appendChild(banner);
      scrollBottom();
      setTimeout(function() { location.reload(); }, 1500);
    }

  } catch (e) {
    streaming = false;
    setInputDisabled(false);
    messages.push({ id: uid(), role: "assistant", parts: [{ type: "text", text: "Connection error: " + e.message }], createdAt: new Date().toISOString() });
    save(); render();
  }
};

/* --- Init --- */
load();
if (!authHeader) renderAuth();
else renderInput();
render();
})();
</script>
